name: yizhifu
title: 易支付
icon: svg:icon-yizhifu
input:
  url:
    title: url
    component:
      placeholder: https://pay.xxxx.com
    helper: 易支付系统地址
    required: true
    encrypt: false
  pid:
    title: 商户id
    component:
      placeholder: pid
    required: true
    encrypt: false
  key:
    title: key
    component:
      placeholder: key
    required: true
    encrypt: true
  payType:
    title: 固定支付方式
    component:
      placeholder: 固定一种支付方式，也就是submit.php中的type参数
    helper: 不填则跳转到收银台由用户自己选择，如果您的易支付系统不支持收银台，则必须填写
    required: false
    encrypt: false
  signType:
    title: 签名方式
    component:
      name: a-select
      vModel: value
      options:
        - label: MD5
          value: MD5
        - label: SHA256
          value: SHA256
    required: true
    encrypt: false
pluginType: access
