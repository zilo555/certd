name: dingtalk
title: 钉钉通知
desc: 钉钉群聊通知
needPlus: true
input:
  webhook:
    title: webhook地址
    component:
      placeholder: https://oapi.dingtalk.com/robot/send?access_token=xxxxxxxxxxxxxxx
    helper: >-
      钉钉APP->群聊->设置->机器人->添加机器人->自定义->[创建机器人->复制webhook地址](https://open.dingtalk.com/document/robots/custom-robot-access)
    required: true
  secret:
    title: 加签密钥
    component:
      placeholder: SECxxxxxxxxxxxxxxxxxxxxx
    helper: 必须选择一种安全设置，请选择加密密钥
    required: false
  atUserIds:
    title: '@用户ID'
    component:
      placeholder: 非必填，填写完一个按回车
      name: a-select
      vModel: value
      mode: tags
      multiple: true
      open: false
    helper: 填写要@的用户ID
    required: false
  atMobiles:
    title: '@用户手机号'
    component:
      placeholder: 非必填，填写一个按回车
      name: a-select
      vModel: value
      mode: tags
      multiple: true
      open: false
    helper: 填写要@的用户的手机号
    required: false
  isAtAll:
    title: '@all'
    component:
      placeholder: 非必填
      name: a-switch
      vModel: checked
    helper: 是否@所有人
    required: false
pluginType: access
