name: discord
title: Discord 通知
desc: Discord 机器人通知
needPlus: true
input:
  webhook:
    title: Webhook URL
    component:
      placeholder: https://discord.com/api/webhooks/xxxxx/xxxx
    helper: >-
      [Discord Webhook
      说明](https://discord.com/developers/docs/resources/webhook#execute-webhook)
    required: true
  mentionedList:
    title: 提醒指定成员
    component:
      name: a-select
      vModel: value
      mode: tags
      open: false
    required: false
    helper: 填写成员的Id，或者角色Id（&id），或者everyone
  httpsProxy:
    title: 代理
    component:
      placeholder: http://xxxxx:xx
    helper: 使用https_proxy
    required: false
  skipSslVerify:
    title: 忽略证书校验
    value: false
    component:
      name: a-switch
      vModel: checked
    required: false
pluginType: access
