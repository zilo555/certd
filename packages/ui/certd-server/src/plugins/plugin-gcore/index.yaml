showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: Gcoreupload
title: Gcore-部署证书到Gcore
desc: 仅上传 并不会部署到cdn
icon: clarity:plugin-line
group: cdn
input:
  certName:
    title: 证书名称
    helper: 作为备注
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: Gcore
    component:
      name: access-selector
      type: Gcore
    required: true
    order: 0
output: {}
pluginType: deploy
