showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToCDN
title: 火山引擎-部署证书至CDN
icon: svg:icon-volcengine
group: volcengine
desc: 支持网页，文件下载，音视频点播
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - VolcengineUploadCert
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  serviceType:
    title: 服务类型
    helper: 网页，文件下载，音视频点播
    component:
      name: a-select
      options:
        - label: 网页
          value: web
        - label: 文件下载
          value: download
        - label: 音视频点播
          value: video
    value: web
    required: true
    order: 0
  domainName:
    title: CDN加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
        - serviceType
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 你在火山引擎上配置的CDN加速域名，比如:certd.docmirror.cn
    order: 0
output: {}
pluginType: deploy
