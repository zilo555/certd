showRunStrategy: true
default:
  strategy:
    runStrategy: 1
name: CustomScript
title: 自定义js脚本
icon: ri:javascript-line
desc: 【仅管理员】运行自定义js脚本执行
group: other
input:
  script:
    title: 脚本
    helper: 自定义js脚本，[脚本编写帮助文档](https://certd.docmirror.cn/guide/use/custom-script/)
    component:
      name: a-textarea
      vModel: value
      rows: 10
      style: 'background-color: #000c17;color: #fafafa;'
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: false
    order: 0
output: {}
pluginType: deploy
