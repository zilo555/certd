showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: UpyunDeployToCdn
title: 又拍云-部署证书到CDN/USS
icon: svg:icon-upyun
desc: 支持又拍云CDN，又拍云云存储USS
group: cdn
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Upyun授权
    component:
      name: access-selector
      type: upyun
    required: true
    order: 0
  cdnList:
    title: 加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: UpyunDeployToCdn
      action: onGetCdnList
      watches:
        - certDomains
        - accessId
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择加速域名，可以手动输入
    order: 0
  forceHttps:
    title: 强制HTTPS
    value: keep
    component:
      name: a-select
      vModel: value
      options:
        - value: 'true'
          label: 强制HTTPS
        - value: 'false'
          label: 不强制HTTPS
        - value: keep
          label: 保持原样
    required: true
    order: 0
  https:
    title: 开启HTTPS
    value: 'true'
    component:
      name: a-select
      vModel: value
      options:
        - value: 'true'
          label: 开启HTTPS
        - value: 'false'
          label: 关闭HTTPS
        - value: keep
          label: 保持原样
    required: true
    order: 0
output: {}
pluginType: deploy
