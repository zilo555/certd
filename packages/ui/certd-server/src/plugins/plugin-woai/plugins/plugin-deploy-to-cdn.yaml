showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: WoaiCDN
title: 我爱云-部署证书到我爱云CDN
desc: 部署证书到我爱云CDN
icon: clarity:plugin-line
group: cdn
input:
  baseApi:
    title: 接口地址(可留空)
    helper: 请填写我爱云的地址, 默认为 [API](https://console.edeg.sxhjgy.cn) 末尾请不要携带`/`
    component:
      name: a-input
    required: false
    order: 0
  certId:
    title: 证书ID
    helper: 请填写 [证书列表](https://console.edge.sxhjgy.cn/site/certificate) 中的证书的ID
    component:
      name: a-input
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 我爱云的用户、密码授权
    component:
      name: access-selector
      type: woai
    required: true
    order: 0
output: {}
pluginType: deploy
