showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AwsDeployToCloudFront
title: AWS-部署证书到CloudFront
desc: 部署证书到 AWS CloudFront
icon: svg:icon-aws
group: aws
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - AwsUploadToACM
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  region:
    title: 区域
    helper: 证书上传区域
    component:
      name: a-auto-complete
      vModel: value
      options:
        - label: us-east-1
          value: us-east-1
        - label: us-east-2
          value: us-east-2
        - label: us-west-1
          value: us-west-1
        - label: us-west-2
          value: us-west-2
        - label: af-south-1
          value: af-south-1
        - label: ap-east-1
          value: ap-east-1
        - label: ap-northeast-1
          value: ap-northeast-1
        - label: ap-northeast-2
          value: ap-northeast-2
        - label: ap-northeast-3
          value: ap-northeast-3
        - label: ap-south-1
          value: ap-south-1
        - label: ap-south-2
          value: ap-south-2
        - label: ap-southeast-1
          value: ap-southeast-1
        - label: ap-southeast-2
          value: ap-southeast-2
        - label: ap-southeast-3
          value: ap-southeast-3
        - label: ap-southeast-4
          value: ap-southeast-4
        - label: ap-southeast-5
          value: ap-southeast-5
        - label: ca-central-1
          value: ca-central-1
        - label: ca-west-1
          value: ca-west-1
        - label: eu-central-1
          value: eu-central-1
        - label: eu-central-2
          value: eu-central-2
        - label: eu-north-1
          value: eu-north-1
        - label: eu-south-1
          value: eu-south-1
        - label: eu-south-2
          value: eu-south-2
        - label: eu-west-1
          value: eu-west-1
        - label: eu-west-2
          value: eu-west-2
        - label: eu-west-3
          value: eu-west-3
        - label: il-central-1
          value: il-central-1
        - label: me-central-1
          value: me-central-1
        - label: me-south-1
          value: me-south-1
        - label: sa-east-1
          value: sa-east-1
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: aws的授权
    component:
      name: access-selector
      type: aws
    required: true
    order: 0
  distributionIds:
    title: 分配ID
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDistributions
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择distributions id
    order: 0
output: {}
pluginType: deploy
