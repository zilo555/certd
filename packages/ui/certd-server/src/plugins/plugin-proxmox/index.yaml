showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: ProxmoxUploadCert
title: Proxmox-上传证书到Proxmox
icon: svg:icon-proxmox
group: panel
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    order: 0
  accessId:
    title: Proxmox授权
    component:
      name: access-selector
      type: proxmox
    required: true
    order: 0
  nodes:
    title: 节点
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: ProxmoxUploadCert
      action: onGetNodeList
      watches:
        - certDomains
        - accessId
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要部署证书的节点
    order: 0
output: {}
pluginType: deploy
