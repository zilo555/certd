showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToAliyunCDN
title: 阿里云-部署证书至CDN
icon: svg:icon-aliyun
group: aliyun
desc: 自动部署域名证书至阿里云CDN
input:
  endpoint:
    title: 证书服务接入点
    helper: 不会选就按默认
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
        - value: cas.eu-central-1.aliyuncs.com
          label: 德国（法兰克福）
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  domainName:
    title: CDN加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: DeployCertToAliyunCDN
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 你在阿里云上配置的CDN加速域名，比如:certd.docmirror.cn
    order: 0
  certRegion:
    title: 证书所在地域
    helper: cn-hangzhou和ap-southeast-1，默认cn-hangzhou。国际站用户建议使用ap-southeast-1。
    value: cn-hangzhou
    component:
      name: a-select
      options:
        - value: cn-hangzhou
          label: 中国大陆
        - value: ap-southeast-1
          label: 新加坡
    required: true
    order: 0
  certName:
    title: 证书名称
    helper: 上传后将以此名称作为前缀备注
    order: 0
output: {}
pluginType: deploy
