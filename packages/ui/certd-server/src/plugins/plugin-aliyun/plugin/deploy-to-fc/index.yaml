showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToFC
title: 阿里云-部署至阿里云FC(3.0)
icon: svg:icon-aliyun
group: aliyun
desc: 部署证书到阿里云函数计算（FC3.0）,【注意】证书的加密算法必须选择【pkcs1旧版】
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择证书申请任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  regionId:
    title: FC大区
    value: cn-hangzhou
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: cn-qingdao
          label: 华北1（青岛）
        - value: cn-beijing
          label: 华北2（北京）
        - value: cn-zhangjiakou
          label: 华北 3（张家口）
        - value: cn-huhehaote
          label: 华北5（呼和浩特）
        - value: cn-hangzhou
          label: 华东1（杭州）
        - value: cn-shanghai
          label: 华东2（上海）
        - value: cn-shenzhen
          label: 华南1（深圳）
        - value: ap-southeast-2
          label: 澳大利亚（悉尼）
        - value: eu-central-1
          label: 德国（法兰克福）
        - value: ap-southeast-3
          label: 马来西亚（吉隆坡）
        - value: us-east-1
          label: 美国（弗吉尼亚）
        - value: us-west-1
          label: 美国（硅谷）
        - value: ap-northeast-1
          label: 日本（东京）
        - value: ap-southeast-7
          label: 泰国（曼谷）
        - value: cn-chengdu
          label: 西南1（成都）
        - value: ap-southeast-1
          label: 新加坡
        - value: ap-south-1
          label: 印度（孟买）
        - value: ap-southeast-5
          label: 印度尼西亚（雅加达）
        - value: eu-west-1
          label: 英国（伦敦）
        - value: cn-hongkong
          label: 中国香港
    required: true
    order: 0
  accountId:
    title: 阿里云账号id
    helper: 阿里云主账号ID，右上角头像下方获取
    component:
      name: a-input
      vModel: value
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  fcDomains:
    title: FC域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: AliyunDeployCertToFC
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: |-
      请选择要部署证书的域名
      【注意】证书的加密算法必须选择【pkcs1旧版】（否则会报'private key' has to be in PEM format错误）
    order: 0
  protocol:
    title: 域名支持的协议类型
    component:
      name: a-select
      value: ''
      options:
        - value: ''
          label: 保持原样（适用于原来已经开启了HTTPS）
        - value: HTTPS
          label: 仅HTTPS
        - value: HTTP,HTTPS
          label: HTTP与HTTPS同时支持
    order: 0
output: {}
pluginType: deploy
