showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToALB
title: 阿里云-部署至ALB（应用负载均衡）
icon: svg:icon-aliyun
group: aliyun
desc: ALB,更新监听器的默认证书
needPlus: false
input:
  cert:
    title: 域名证书
    helper: |-
      请选择证书申请任务输出的域名证书
      或者选择前置任务“上传证书到阿里云”任务的证书ID，可以减少上传到阿里云的证书数量
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  regionId:
    title: ALB所在地区
    component:
      name: remote-select
      vModel: value
      type: plugin
      typeName: AliyunDeployCertToALB
      action: onGetRegionList
      watches:
        - certDomains
        - accessId
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择
    order: 0
  loadBalancers:
    title: 负载均衡列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: AliyunDeployCertToALB
      action: onGetLoadBalanceList
      watches:
        - certDomains
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要部署证书的负载均衡ID
    order: 0
  listeners:
    title: 监听器列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: AliyunDeployCertToALB
      action: onGetListenerList
      watches:
        - certDomains
        - accessId
        - loadBalancers
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要部署证书的监听器列表
    order: 0
  casEndpoint:
    title: 证书接入点
    helper: 不会选就保持默认即可
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
        - value: cas.eu-central-1.aliyuncs.com
          label: 德国（法兰克福）
    required: true
    order: 0
output: {}
pluginType: deploy
