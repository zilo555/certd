showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: HauweiUploadToCCM
title: 华为云-上传证书至CCM
icon: svg:icon-huawei
group: huawei
desc: 上传证书到华为云CCM
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 华为云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: huawei
    required: true
    order: 0
output:
  huaweiCertId:
    title: 华为云CertId
pluginType: deploy
