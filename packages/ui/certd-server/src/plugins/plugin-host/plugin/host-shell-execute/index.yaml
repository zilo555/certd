showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: hostShellExecute
title: 主机-执行远程主机脚本命令
icon: tabler:brand-powershell
group: host
desc: 可以执行重启nginx等操作让证书生效
input:
  accessId:
    title: 主机登录配置
    helper: 登录
    component:
      name: access-selector
      type: ssh
    required: true
    order: 0
  script:
    title: shell脚本命令
    component:
      name: a-textarea
      vModel: value
      rows: 6
      placeholder: systemctl restart nginx
    helper: 注意：如果目标主机是windows，且终端是cmd，系统会自动将多行命令通过“&&”连接成一行
    required: true
    order: 0
output: {}
pluginType: deploy
