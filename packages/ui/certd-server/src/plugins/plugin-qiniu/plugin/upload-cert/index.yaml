showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: QiniuCertUpload
title: 七牛云-上传证书到七牛云
icon: svg:icon-qiniuyun
group: qiniu
desc: 上传到七牛云
input:
  certName:
    title: 证书名称
    helper: 上传后将以此名称作为前缀备注
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 七牛云授权
    component:
      name: access-selector
      type: qiniu
    required: true
    order: 0
output:
  qiniuCertId:
    title: 上传成功后的七牛云CertId
pluginType: deploy
