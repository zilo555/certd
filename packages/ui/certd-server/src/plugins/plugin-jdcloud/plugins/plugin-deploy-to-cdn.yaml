showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: JDCloudDeployToCDN
title: 京东云-部署证书至CDN
icon: svg:icon-jdcloud
group: jdcloud
desc: 京东云内容分发网络
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - JDCloudUploadCert
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 京东云AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: jdcloud
    required: true
    order: 0
  domainName:
    title: CDN加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 你在京东云上配置的CDN加速域名，比如:certd.docmirror.cn
    order: 0
output: {}
pluginType: deploy
