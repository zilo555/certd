showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: JDCloudUpdateCert
title: 京东云-更新已有证书
icon: svg:icon-jdcloud
group: jdcloud
desc: 更新SSL数字证书中的证书
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - JDCloudUploadCert
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 京东云AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: jdcloud
    required: true
    order: 0
  certIds:
    title: 要更新的证书id
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetCertList
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 您在京东云上已有的证书Id
    order: 0
output: {}
pluginType: deploy
