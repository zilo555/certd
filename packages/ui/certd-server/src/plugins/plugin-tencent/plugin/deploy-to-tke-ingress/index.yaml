showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentTKEIngress
title: 腾讯云-部署到TKE-ingress
needPlus: true
icon: svg:icon-tencentcloud
group: tencent
desc: serverless集群请使用K8S部署插件；Qcloud类型需要【上传到腾讯云】作为前置任务；ApiServer未开启外网访问则需要做域名的内网IP映射
input:
  region:
    title: 大区
    value: ap-guangzhou
    required: true
    order: 0
  clusterId:
    title: 集群ID
    required: true
    desc: 例如：cls-6lbj1vee
    request: true
    order: 0
  namespace:
    title: 集群namespace
    value: default
    required: true
    order: 0
  secretName:
    title: 证书的secret名称
    required: true
    order: 0
  ingressName:
    title: ingress名称
    required: true
    order: 0
  ingressClass:
    title: ingress类型
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: qcloud
        - value: nginx
    helper: 可选 qcloud / nginx
    order: 0
  clusterDomain:
    title: 集群域名
    helper: 可不填，默认为:[clusterId].ccs.tencent-cloud.com
    order: 0
  accessId:
    title: Access授权
    helper: access授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  tencentCertId:
    title: 腾讯云证书id
    helper: 请选择“上传证书到腾讯云”前置任务的输出
    component:
      name: output-selector
      from: UploadCertToTencent
    mergeScript: |2-

            return {
              show: ctx.compute(({form})=>{
                return form.ingressClass === "qcloud"
              })
            }
          
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    mergeScript: |2-

            return {
              show: ctx.compute(({form})=>{
                return form.ingressClass === "nginx"
              })
            }
          
    required: true
    order: 0
output: {}
pluginType: deploy
