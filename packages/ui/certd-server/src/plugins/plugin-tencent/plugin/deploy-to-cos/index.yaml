showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentCosPlugin
title: 腾讯云-部署证书到COS
needPlus: false
icon: svg:icon-tencentcloud
group: tencent
desc: 部署到腾讯云COS源站域名证书【注意：很不稳定，需要重试很多次偶尔才能成功一次】
input:
  accessId:
    title: Access授权
    helper: access授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  bucket:
    title: 存储桶名称
    helper: 请输入存储桶名称
    order: 0
  region:
    title: 所在地域
    helper: 存储桶所在地域
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: ''
          label: '--------中国大陆地区-------'
          disabled: true
        - value: ap-beijing-1
          label: 北京1区
        - value: ap-beijing
          label: 北京
        - value: ap-nanjing
          label: 南京
        - value: ap-shanghai
          label: 上海
        - value: ap-guangzhou
          label: 广州
        - value: ap-chengdu
          label: 成都
        - value: ap-chongqing
          label: 重庆
        - value: ap-shenzhen-fsi
          label: 深圳金融
        - value: ap-shanghai-fsi
          label: 上海金融
        - value: ap-beijing-fsi
          label: 北京金融
        - value: ''
          label: '--------中国香港及境外-------'
          disabled: true
        - value: ap-hongkong
          label: 中国香港
        - value: ap-singapore
          label: 新加坡
        - value: ap-mumbai
          label: 孟买
        - value: ap-jakarta
          label: 雅加达
        - value: ap-seoul
          label: 首尔
        - value: ap-bangkok
          label: 曼谷
        - value: ap-tokyo
          label: 东京
        - value: na-siliconvalley
          label: 硅谷
        - value: na-ashburn
          label: 弗吉尼亚
        - value: sa-saopaulo
          label: 圣保罗
        - value: eu-frankfurt
          label: 法兰克福
    order: 0
  domains:
    title: COS域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: DeployCertToTencentCosPlugin
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
        - bucket
        - region
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择域名
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书，或者选择前置任务“上传证书到腾讯云”任务的证书ID
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - UploadCertToTencent
    required: true
    order: 0
output: {}
pluginType: deploy
