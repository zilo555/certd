showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentEO
title: 腾讯云-部署到腾讯云EO
icon: svg:icon-tencentcloud
desc: 腾讯云边缘安全加速平台EO，必须配置上传证书到腾讯云任务
group: tencent
input:
  certId:
    title: 已上传证书ID
    helper: 请选择前置任务上传到腾讯云的证书
    component:
      name: output-selector
      from: UploadCertToTencent
    required: true
    order: 0
  accessId:
    title: Access提供者
    helper: access 授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  zoneId:
    title: 站点ID
    helper: 类似于zone-xxxx的字符串，在站点概览页面左上角，或者，站点列表页面站点名称下方
    required: true
    order: 0
  certName:
    title: 证书名称
    helper: 证书上传后将以此参数作为名称前缀
    order: 0
  domainNames:
    title: cdn加速域名
    component:
      name: a-select
      vModel: value
      mode: tags
      open: false
    helper: 支持多个域名
    rules:
      - required: true
        message: 该项必填
    order: 0
output: {}
pluginType: deploy
