showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: UploadCertToTencent
title: 腾讯云-上传证书到腾讯云
icon: svg:icon-tencentcloud
desc: 上传成功后输出：tencentCertId
group: tencent
input:
  name:
    title: 证书名称
    order: 0
  accessId:
    title: Access授权
    helper: access授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
output:
  tencentCertId:
    title: 上传成功后的腾讯云CertId
pluginType: deploy
