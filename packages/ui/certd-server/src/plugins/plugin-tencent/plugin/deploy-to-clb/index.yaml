showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentCLB
title: 腾讯云-部署到CLB
icon: svg:icon-tencentcloud
group: tencent
desc: 暂时只支持单向认证证书，暂时只支持通用负载均衡
input:
  region:
    title: 大区
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: ap-guangzhou
        - value: ap-beijing
        - value: ap-chengdu
        - value: ap-chongqing
        - value: ap-hongkong
        - value: ap-jakarta
        - value: ap-mumbai
        - value: ap-nanjing
        - value: ap-seoul
        - value: ap-shanghai
        - value: ap-shanghai-fsi
        - value: ap-shenzhen-fsi
        - value: ap-singapore
        - value: ap-tokyo
        - value: eu-frankfurt
        - value: na-ashburn
        - value: na-siliconvalley
        - value: na-toronto
        - value: sa-saopaulo
    required: true
    order: 0
  certName:
    title: 证书名称前缀
    order: 0
  loadBalancerId:
    title: 负载均衡ID
    helper: 如果没有配置，则根据域名匹配负载均衡下的监听器（根据域名匹配时暂时只支持前100个）
    required: true
    order: 0
  listenerId:
    title: 监听器ID
    required: true
    order: 0
  domain:
    title: 域名
    required: false
    component:
      name: a-select
      vModel: value
      open: false
      mode: tags
    helper: 如果开启了sni，则此项必须填写，未开启，则不要填写
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
    required: true
    order: 0
  accessId:
    title: Access提供者
    helper: access授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
output: {}
pluginType: deploy
