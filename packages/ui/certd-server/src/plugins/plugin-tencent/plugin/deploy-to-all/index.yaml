showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentAll
title: 腾讯云-部署证书到任意云资源
needPlus: false
icon: svg:icon-tencentcloud
group: tencent
desc: 支持负载均衡、CDN、DDoS、直播、点播、Web应用防火墙、API网关、TEO、容器服务、对象存储、轻应用服务器、云原生微服务、云开发
input:
  accessId:
    title: Access授权
    helper: access授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  tencentCertId:
    title: 证书
    helper: 请选择"证书申请任务"或“上传证书到腾讯云”前置任务的输出
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - UploadCertToTencent
    required: true
    order: 0
  resourceType:
    title: 资源类型
    component:
      name: a-select
      vModel: value
      allowClear: true
      options:
        - value: clb
          label: 负载均衡
        - value: cdn
          label: CDN
        - value: ddos
          label: DDoS
        - value: live
          label: 直播
        - value: vod
          label: 点播
        - value: waf
          label: Web应用防火墙
        - value: apigateway
          label: API网关
        - value: teo
          label: TEO
        - value: tke
          label: 容器服务
        - value: cos
          label: 对象存储
        - value: lighthouse
          label: 轻应用服务器
        - value: tse
          label: 云原生微服务
        - value: tcb
          label: 云开发
    helper: ''
    required: true
    order: 0
  region:
    title: Region
    component:
      name: a-input
      vModel: value
      allowClear: true
    helper: >-
      当云资源类型传入clb、waf、apigateway、cos、lighthouse、tke、tse、tcb
      时，公共参数Region必传。[参考文档](https://cloud.tencent.com/document/product/400/91667)
    order: 0
  instanceIdList:
    title: 云资源实例Id列表
    component:
      name: a-select
      vModel: value
      open: false
      mode: tags
    helper: '[参考文档](https://cloud.tencent.com/document/product/400/91667)'
    order: 0
output: {}
pluginType: deploy
