showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: TencentDeployCertToCDNv2
title: 腾讯云-部署到CDN-v2
icon: svg:icon-tencentcloud
group: tencent
desc: 推荐使用
input:
  accessId:
    title: Access提供者
    helper: access 授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  domains:
    title: CDN域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: TencentDeployCertToCDNv2
      action: onGetDomainList
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择域名或输入域名
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书，或者选择前置任务“上传证书到腾讯云”任务的证书ID
    component:
      name: output-selector
      from:
        - CertApply
        - CertApplyLego
        - CertApplyUpload
        - UploadCertToTencent
    required: true
    order: 0
output: {}
pluginType: deploy
