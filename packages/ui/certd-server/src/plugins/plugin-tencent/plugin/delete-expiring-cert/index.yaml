showRunStrategy: false
default:
  strategy:
    runStrategy: 0
name: TencentDeleteExpiringCert
title: 腾讯云-删除即将过期证书
icon: svg:icon-tencentcloud
group: tencent
desc: 仅删除未使用的证书
needPlus: true
input:
  accessId:
    title: Access提供者
    helper: access 授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  searchKey:
    title: 关键字筛选
    helper: 仅匹配ID、备注名称、域名包含关键字的证书，可以不填
    required: false
    component:
      name: a-input
    order: 0
  maxCount:
    title: 最大删除数量
    helper: 单次运行最大删除数量
    value: 100
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
  expiringDays:
    title: 即将过期天数
    helper: >-
      仅删除有效期小于此天数的证书,

      <span
      class="color-red">注意：`1.26.14`版本之前Certd创建的证书流水线默认是到期前20天才更新证书，需要将之前创建的证书申请任务的更新天数改为35天，保证删除之前就已经替换掉即将过期证书</span>
    value: 30
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
  checkTimeout:
    title: 检查超时时间
    helper: 检查删除任务结果超时时间,单位分钟
    value: 10
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
output: {}
pluginType: deploy
