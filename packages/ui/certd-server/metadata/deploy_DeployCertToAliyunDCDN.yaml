showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToAliyunDCDN
title: 阿里云-部署证书至DCDN
icon: svg:icon-aliyun
group: aliyun
desc: 依赖证书申请前置任务，自动部署域名证书至阿里云DCDN
runStrategy: 0
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  certName:
    title: 证书名称
    helper: 上传后将以此名称作为前缀备注
    order: 0
  domainMatchMode:
    title: 域名匹配模式
    helper: 根据证书匹配：根据证书域名自动匹配DCDN加速域名自动部署，新增加速域名自动感知，自动新增部署
    component:
      name: a-select
      options:
        - label: 手动选择
          value: manual
        - label: 根据证书匹配
          value: auto
    value: manual
    order: 0
  domainName:
    title: DCDN加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: true
      pager: true
      single: false
      pageSize: 100
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

              return {
                show: ctx.compute(({form})=>{
                  return form.domainMatchMode === "manual"
                })
              }
            
    helper: 你在阿里云上配置的DCDN加速域名，比如:certd.docmirror.cn
    order: 0
output:
  deployedList:
    title: 已部署过的DCDN加速域名
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-dcdn/index.js
