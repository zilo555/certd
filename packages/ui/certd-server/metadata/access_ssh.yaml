name: ssh
title: 主机登录授权
desc: ''
icon: clarity:host-line
input:
  host:
    title: 主机地址
    component:
      placeholder: 主机域名或IP地址
    required: true
  port:
    title: 端口
    value: 22
    component:
      name: a-input-number
      placeholder: '22'
    rules:
      - required: true
        message: 此项必填
  username:
    title: 用户名
    value: root
    rules:
      - required: true
        message: 此项必填
  password:
    title: 密码
    component:
      name: a-input-password
      vModel: value
    encrypt: true
    helper: 登录密码或密钥必填一项
  privateKey:
    title: 私钥登录
    helper: 私钥或密码必填一项
    component:
      name: pem-input
      vModel: modelValue
    encrypt: true
  passphrase:
    title: 私钥密码
    helper: 如果你的私钥有密码的话
    component:
      name: a-input-password
      vModel: value
    encrypt: true
  scriptType:
    title: 脚本类型
    helper: bash 、sh 、fish
    component:
      name: a-select
      vModel: value
      options:
        - value: default
          label: 默认
        - value: sh
          label: sh
        - value: bash
          label: bash
        - value: fish
          label: fish(不支持set -e)
  pty:
    title: 伪终端
    helper: >-
      如果登录报错：all authentication methods failed / unable to
      exec，可以尝试开启伪终端模式进行keyboard-interactive方式登录

      开启后对日志输出有一定的影响
    component:
      name: a-switch
      vModel: checked
  socksProxy:
    title: socks代理
    helper: socks代理配置，格式：socks5://user:password@host:port
    component:
      name: a-input
      vModel: value
      placeholder: socks5://user:password@host:port
    encrypt: false
  timeout:
    title: 超时时间
    helper: 执行命令的超时时间，单位秒,默认30分钟
    component:
      name: a-input-number
  windows:
    title: 是否Windows
    helper: >-
      如果是Windows主机，请勾选此项

      并且需要windows[安装OpenSSH](https://certd.docmirror.cn/guide/use/host/windows.html)
    component:
      name: a-switch
      vModel: checked
  encoding:
    title: 命令编码
    helper: 如果是Windows主机，且出现乱码了，请尝试设置为GBK
    component:
      name: a-select
      vModel: value
      options:
        - value: ''
          label: 默认
        - value: GBK
          label: GBK
        - value: UTF8
          label: UTF-8
  testRequest:
    title: 测试
    component:
      name: api-test
      type: access
      typeName: ssh
      action: TestRequest
    mergeScript: |2-

               return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 点击测试
order: 0
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-lib/ssh/ssh-access.js
