showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: PleskDeploySiteCert
title: Plesk-部署Plesk网站证书
icon: svg:icon-plesk
group: panel
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Plesk授权
    component:
      name: access-selector
      type: plesk
    required: true
    order: 0
  siteDomainIds:
    title: 网站域名列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择要更新的站点域名，注意域名是否与证书匹配
    order: 0
  clearUnused:
    title: 删除未使用证书
    component:
      name: a-switch
      vModel: checked
    required: false
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/plesk/plugins/plugin-deploy-cert.js
