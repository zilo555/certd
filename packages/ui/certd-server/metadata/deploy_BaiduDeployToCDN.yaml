showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: BaiduDeployToCDN
title: 百度云-部署证书到CDN
icon: ant-design:baidu-outlined
group: baidu
desc: 部署到百度云CDN
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - BaiduUploadCert
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: true
    order: 0
  accessId:
    title: 百度云授权
    helper: 百度云授权
    component:
      name: access-selector
      type: baidu
    required: true
    order: 0
  domains:
    title: CDN域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      action: GetDomainList
      watches:
        - certDomains
        - accessId
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/baidu/plugins/plugin-deploy-to-cdn.js
