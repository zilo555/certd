showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: BaotaDeployWAF
title: 宝塔-WAF证书部署
icon: svg:icon-bt
group: panel
desc: 部署宝塔云WAF/aaWAF
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: true
    order: 0
  accessId:
    title: 宝塔WAF授权
    helper: aaWAF的接口密钥
    component:
      name: access-selector
      type: baotawaf
    required: true
    order: 0
  siteIds:
    title: 站点ID
    component:
      name: remote-select
      vModel: value
      mode: tags
      action: onGetSiteList
      search: true
      watches:
        - certDomains
        - accessId
    required: true
    helper: 将会自动获取证书匹配的站点，请选择要部署证书的站点
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-plus/baota/plugins/plugin-deploy-to-aawaf.js
