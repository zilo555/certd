showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: 1PanelDeployToPanel
title: 1Panel-部署面板证书
icon: svg:icon-onepanel
desc: 更新1Panel的面板证书
group: panel
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: true
    order: 0
  accessId:
    title: 1Panel授权
    helper: 1Panel授权
    component:
      name: access-selector
      type: 1panel
    required: true
    order: 0
  currentNode:
    title: 1Panel节点
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: OnePanelDeployToPanelPlugin
      action: onGetNodes
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
    value: local
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要更新的1Panel证书的节点信息，目前只有v2存在此概念
    order: 0
  sslMode:
    title: SSL模式
    helper: SSL模式，只有2.1.x以上版本才支持，旧版本保持默认即可
    component:
      name: a-select
      vMode: value
      options:
        - label: 启用SSL(旧版本)
          value: enable
        - label: Strict模式(>=2.1.x)
          value: Enable
        - label: Mux模式(>=2.1.x)
          value: Mux
    value: enable
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/1panel/plugins/deploy-to-panel.js
