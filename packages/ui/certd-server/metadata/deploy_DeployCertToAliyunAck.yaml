showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToAliyunAck
title: 阿里云-部署到Ack
icon: svg:icon-aliyun
desc: 部署到阿里云Ack集群Ingress等通过Secret管理证书的应用
group: aliyun
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  regionId:
    title: 大区
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: cn-qingdao
          label: 华北1（青岛）
        - value: cn-beijing
          label: 华北2（北京）
        - value: cn-zhangjiakou
          label: 华北3（张家口）
        - value: cn-huhehaote
          label: 华北5（呼和浩特）
        - value: cn-wulanchabu
          label: 华北6（乌兰察布）
        - value: cn-hangzhou
          label: 华东1（杭州）
        - value: cn-shanghai
          label: 华东2（上海）
        - value: cn-shenzhen
          label: 华南1（深圳）
        - value: cn-guangzhou
          label: 华南3（广州）
        - value: ap-southeast-2
          label: 澳大利亚（悉尼）
        - value: ap-southeast-3
          label: 马来西亚（吉隆坡）
        - value: ap-northeast-1
          label: 日本（东京）
        - value: cn-chengdu
          label: 西南1（成都）
        - value: ap-southeast-1
          label: 新加坡
        - value: ap-southeast-5
          label: 印度尼西亚（雅加达）
        - value: cn-hongkong
          label: 中国香港
        - value: eu-central-1
          label: 德国（法兰克福）
        - value: us-east-1
          label: 美国（弗吉尼亚）
        - value: us-west-1
          label: 美国（硅谷）
        - value: eu-west-1
          label: 英国（伦敦）
        - value: me-east-1
          label: 阿联酋（迪拜）
        - value: cn-beijing-finance-1
          label: 华北2 金融云（邀测）
        - value: cn-hangzhou-finance
          label: 华东1 金融云
        - value: cn-shanghai-finance-1
          label: 华东2 金融云
        - value: cn-shenzhen-finance-1
          label: 华南1 金融云
      placeholder: 集群所属大区
    required: true
    order: 0
  clusterId:
    title: 集群id
    component:
      placeholder: 集群id
    required: true
    order: 0
  secretName:
    title: 保密字典Id
    component:
      placeholder: 保密字典Id
    helper: 原本存储证书的secret的name
    required: true
    order: 0
  namespace:
    title: 命名空间
    value: default
    component:
      placeholder: 命名空间
    required: true
    order: 0
  isPrivateIpAddress:
    title: 是否私网ip
    value: false
    component:
      name: a-switch
      vModel: checked
      placeholder: 集群连接端点是否是私网ip
    helper: 如果您当前certd运行在同一个私网下，可以选择是。
    required: true
    order: 0
  skipTLSVerify:
    title: 忽略证书校验
    required: false
    helper: 是否忽略证书校验
    component:
      name: a-switch
      vModel: checked
    order: 0
  createOnNotFound:
    title: Secret自动创建
    helper: 如果Secret不存在，则创建
    value: false
    component:
      name: a-switch
      vModel: checked
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-ack/index.js
