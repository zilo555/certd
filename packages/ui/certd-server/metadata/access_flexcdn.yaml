name: flexcdn
title: FlexCDN授权
desc: ''
icon: svg:icon-lucky
input:
  endpoint:
    title: 接口地址
    component:
      placeholder: http://xxxxxxx:8080
      name: a-input
      vModel: value
    required: true
  type:
    title: 用户类型
    component:
      placeholder: 请选择
      name: a-select
      vModel: value
      options:
        - value: user
          label: 普通用户
        - value: admin
          label: 管理员
    required: true
  accessKeyId:
    title: accessKeyId
    component:
      placeholder: accessKeyId
      component:
        name: a-input
        vModel: value
    encrypt: false
    required: true
  accessKey:
    title: accessKey
    component:
      placeholder: accessKey
      component:
        name: a-input
        vModel: value
    encrypt: true
    required: true
  skipSslVerify:
    title: 忽略证书校验
    component:
      name: a-switch
      vModel: checked
    encrypt: false
    required: true
    value: false
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口看是否正常
type: builtIn
pluginType: access
scriptFilePath: ../../../plugins/plugin-flex/index.js
