name: dnsmgr
title: 彩虹DNS
icon: clarity:plugin-line
desc: 彩虹DNS管理系统授权
input:
  endpoint:
    title: 系统地址
    component:
      name: a-input
      allowClear: true
      placeholder: https://dnsmgr.example.com
    required: true
  uid:
    title: 用户ID
    component:
      name: a-input
      allowClear: true
      placeholder: '123456'
    required: true
  key:
    title: API密钥
    required: true
    encrypt: true
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-dnsmgr/access.js
