showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToTencentEO
title: 腾讯云-部署到腾讯云EO
icon: svg:icon-tencentcloud
desc: 腾讯云边缘安全加速平台EdgeOne(EO)
group: tencent
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书，或者选择前置任务“上传证书到腾讯云”任务的证书ID
    component:
      name: output-selector
      from:
        - ':cert:'
        - UploadCertToTencent
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access提供者
    helper: access 授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  zoneId:
    title: 站点ID
    component:
      name: remote-auto-complete
      vModel: value
      mode: tags
      type: plugin
      action: onGetZoneList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 类似于zone-xxxx的字符串，在站点概览页面左上角，或者，站点列表页面站点名称下方
    order: 0
  domainNames:
    title: 加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择域名或输入域名
    order: 0
  certName:
    title: 证书名称
    helper: 证书上传后将以此参数作为名称前缀
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-tencent/plugin/deploy-to-eo/index.js
