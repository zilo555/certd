name: alioss
title: 阿里云OSS授权
desc: 包含地域和Bucket
icon: ant-design:aliyun-outlined
input:
  accessId:
    title: 阿里云授权
    component:
      name: access-selector
      vModel: modelValue
      type: aliyun
    helper: 请选择阿里云授权
    required: true
  region:
    title: 大区
    component:
      name: remote-auto-complete
      vModel: value
      type: access
      typeName: alioss
      action: onGetRegionList
    required: true
  bucket:
    title: Bucket
    helper: 存储桶名称
    required: true
    component:
      name: remote-auto-complete
      vModel: value
      type: access
      action: onGetBucketList
      search: false
      pager: false
      watches:
        - accessId
        - region
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-lib/aliyun/access/alioss-access.js
