name: xinnetagent
title: 新网授权（代理方式）
icon: svg:icon-xinnet
desc: ''
input:
  agentCode:
    title: 代理账号
    component:
      placeholder: 代理账号，如：agent0001
    required: true
    encrypt: false
  appSecret:
    title: API密钥
    component:
      name: a-input-password
      vModel: value
      placeholder: API密钥
    required: true
    encrypt: true
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-xinnet/access-agent.js
