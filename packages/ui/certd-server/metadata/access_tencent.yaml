name: tencent
title: 腾讯云
icon: svg:icon-tencentcloud
order: 0
input:
  secretId:
    title: secretId
    helper: |-
      使用对应的插件需要有对应的权限，比如上传证书，需要证书管理权限;部署到clb需要clb相关权限
      前往[密钥管理](https://console.cloud.tencent.com/cam/capi)进行创建
    component:
      placeholder: secretId
    rules:
      - required: true
        message: 该项必填
  secretKey:
    title: secretKey
    component:
      placeholder: secretKey
    encrypt: true
    rules:
      - required: true
        message: 该项必填
  accountType:
    title: 站点类型
    value: cn
    component:
      name: a-select
      options:
        - label: 国内站
          value: cn
        - label: 国际站
          value: intl
    encrypt: false
    rules:
      - required: true
        message: 该项必填
  closeExpiresNotify:
    title: 关闭证书过期通知
    value: true
    component:
      name: a-switch
      vModel: checked
pluginType: access
type: builtIn
scriptFilePath: ../../../plugins/plugin-lib/tencent/access.js
