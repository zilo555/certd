name: maoyun
title: 猫云授权
desc: ''
icon: svg:icon-lucky
input:
  username:
    title: 用户名
    component:
      placeholder: username/手机号/email
      name: a-input
      vModel: value
    helper: 用户名
    required: true
  password:
    title: password
    component:
      placeholder: 密码
      component:
        name: a-input-password
        vModel: value
    encrypt: true
    helper: 密码
    required: true
  httpProxy:
    title: HttpProxy
    component:
      placeholder: http://192.168.x.x:10811
      component:
        name: a-input
        vModel: value
    encrypt: false
    required: false
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口看是否正常
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-plus/maoyun/access.js
