showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AcePanelDeployToWebsite
title: AcePanel-部署到网站
desc: 上传证书并部署到指定网站
icon: svg:icon-lucky
group: panel
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: ACEPanel授权
    component:
      name: access-selector
      type: acepanel
    required: true
    order: 0
  websiteList:
    title: 部署网站
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetWebsiteList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择需要部署证书的网站
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-acepanel/plugins/plugin-deploy-to-website.js
