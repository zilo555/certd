showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToVOD
title: 火山引擎-部署证书至VOD
icon: svg:icon-volcengine
group: volcengine
desc: 部署至火山引擎视频点播
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - VolcengineUploadToCertCenter
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  regionId:
    title: 区域
    helper: 选择火山引擎区域
    component:
      name: select
      options:
        - value: cn-north-1
          label: 华北1（北京）
        - value: ap-southeast-1
          label: 东南亚1（新加坡）
    default: cn-north-1
    required: true
    order: 0
  spaceName:
    title: 空间名称
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetSpaceList
      search: false
      pager: false
      single: true
      watches:
        - certDomains
        - accessId
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择要部署证书的点播空间
    order: 0
  domainType:
    title: 域名类型
    helper: 选择域名类型
    component:
      name: a-select
      vModel: value
      options:
        - value: play
          label: 点播加速域名
        - value: image
          label: 封面加速域名
    value: play
    required: true
    order: 0
  domainList:
    title: 域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
        - spaceName
        - domainType
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: |-
      选择要部署证书的域名
      需要先在域名管理页面进行证书中心访问授权（即点击去配置SSL证书）
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-volcengine/plugins/plugin-deploy-to-vod.js
