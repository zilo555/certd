name: huawei
title: 华为云授权
desc: ''
icon: svg:icon-huawei
order: 0
input:
  accessKeyId:
    title: accessKeyId
    component:
      placeholder: accessKeyId
    helper: >-
      证书申请需要有dns解析权限，前往[我的凭证-访问密钥](https://console.huaweicloud.com/iam/?region=cn-east-3#/mine/accessKey)获取
    required: true
  accessKeySecret:
    title: accessKeySecret
    component:
      placeholder: accessKeySecret
    required: true
    encrypt: true
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-huawei/access/huawei-access.js
