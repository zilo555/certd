showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: TencentRefreshCert
title: 腾讯云-更新证书(Id不变)
desc: 根据证书id一键更新腾讯云证书并自动部署（Id不变），注意该接口为腾讯云白名单功能，非白名单用户无法使用该功能
icon: svg:icon-tencentcloud
group: tencent
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: 腾讯云授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  certList:
    title: 证书Id
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetCertList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要更新的证书id，如果这里没有，请先给手动绑定一次证书
    order: 0
  resourceTypesRegions:
    title: 资源区域
    helper: 如果云资源类型区分区域，请选择区域，如果区域在选项中不存在，请手动输入
    component:
      name: remote-tree-select
      vModel: value
      action: onGetRegionsTree
      pager: false
      search: false
      watches:
        - certList
    required: false
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-tencent/plugin/refresh-cert/index.js
