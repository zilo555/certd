showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: SafelineDeployToWebsitePlugin
title: 雷池-更新证书（支持控制台和防护应用）
icon: svg:icon-safeline
desc: 更新长亭雷池WAF的证书，支持更新控制台和防护应用的证书。
group: panel
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: 雷池授权
    helper: 长亭雷池授权
    component:
      name: access-selector
      type: safeline
    required: true
    order: 0
  certIds:
    title: 雷池证书
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: SafelineDeployToWebsitePlugin
      action: onGetCertIds
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: |-
      请选择要更新的雷池的证书Id，需要先手动到雷池控制台上传一次
      如果输入0，则表示新增证书,运行一次之后可以在雷池中使用该证书，最后记得在此处选择新上传的这个证书id，后续将进行自动更新
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/safeline/plugins/deploy-to-website.js
