name: nextTerminal
title: Next Terminal 授权
icon: clarity:plugin-line
desc: 用于访问 Next Terminal API 的授权配置
input:
  baseUrl:
    title: 系统地址
    component:
      name: a-input
      allowClear: true
      placeholder: https://nt.example.com:8088
    required: true
  apiToken:
    title: API 令牌
    helper: 个人中心->授权令牌->创建令牌
    component:
      name: a-input
      allowClear: true
      placeholder: NT_xxxxx
    required: true
    encrypt: true
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-next-terminal/access.js
