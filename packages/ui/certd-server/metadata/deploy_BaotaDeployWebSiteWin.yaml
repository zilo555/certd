showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: BaotaDeployWebSiteWin
title: 宝塔win-网站证书部署
icon: svg:icon-bt
group: panel
desc: 部署到Windows版宝塔管理的站点的ssl证书
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: true
    order: 0
  accessId:
    title: 宝塔授权
    helper: baota的接口密钥
    component:
      name: access-selector
      type: baota
    required: true
    order: 0
  siteIds:
    title: 站点Id
    component:
      name: remote-select
      vModel: value
      mode: tags
      action: GetSiteList
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

            return {
              component:{
                form: ctx.compute(({form})=>{
                  return form
                })
              },
           }
          
    helper: 将会自动获取证书匹配的站点名称
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-plus/baota/plugins/plugin-deploy-to-website-win.js
