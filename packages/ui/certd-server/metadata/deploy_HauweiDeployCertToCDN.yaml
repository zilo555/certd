showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: HauweiDeployCertToCDN
title: 华为云-部署证书至CDN
icon: svg:icon-huawei
group: huawei
desc: ''
input:
  cert:
    title: 域名证书
    helper: >-
      请选择前置任务输出的域名证书

      如果你选择使用ccm证书ID，则需要在[域名管理页面右上角开启SCM授权](https://console.huaweicloud.com/cdn/#/cdn/domain)
    component:
      name: output-selector
      from:
        - ':cert:'
        - HauweiUploadToCCM
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  enterpriseProjectId:
    title: 企业项目ID
    helper: 华为云子账号必填，"all"表示查询所有项目
    required: false
    value: all
    order: 0
  accessId:
    title: Access授权
    helper: 华为云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: huawei
    required: true
    order: 0
  domains:
    title: CDN域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: HauweiDeployCertToCDN
      action: onGetDomainList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择域名或输入域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-huawei/plugins/deploy-to-cdn/index.js
