showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: UCloudDeployToCDN
title: UCloud-部署到CDN
desc: 将证书部署到UCloud CDN
icon: svg:icon-ucloud
group: ucloud
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - ':UCloudCertId:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: UCloud授权
    component:
      name: access-selector
      type: ucloud
    required: true
    order: 0
  domainList:
    title: 域名列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要更新的UCloud域名列表
    order: 0
output: {}
type: builtIn
pluginType: deploy
scriptFilePath: ../../../plugins/plugin-ucloud/plugins/plugin-deploy-to-cdn.js
