name: bind9
title: BIND9 DNS 授权
desc: 通过 SSH 连接到 BIND9 服务器，使用 nsupdate 命令管理 DNS 记录
icon: clarity:host-line
input:
  sshAccessId:
    title: SSH 授权
    helper: 选择已配置的 SSH 授权
    component:
      name: access-selector
      type: ssh
      vModel: modelValue
    required: true
  dnsServer:
    title: DNS 服务器地址
    helper: BIND9 DNS 服务器地址，用于 nsupdate 命令
    component:
      placeholder: 192.168.182.100
  dnsPort:
    title: DNS 服务器端口
    helper: BIND9 DNS 服务器端口，用于 nsupdate 命令，默认为 53
    value: 53
    component:
      name: a-input-number
      placeholder: '53'
  testRequest:
    title: 测试
    component:
      name: api-test
      type: access
      typeName: bind9
      action: TestRequest
    mergeScript: |2-

               return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 点击测试 SSH 连接和 nsupdate 命令
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-bind9/access.js
