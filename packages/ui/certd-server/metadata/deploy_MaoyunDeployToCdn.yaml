showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: MaoyunDeployToCdn
title: Maoyun-更新猫云CDN证书
icon: svg:icon-lucky
group: cdn
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Maoyun授权
    component:
      name: access-selector
      type: maoyun
    required: true
    order: 0
  domainList:
    title: CDN加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要部署证书的域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/maoyun/plugins/plugin-deploy-to-cdn.js
