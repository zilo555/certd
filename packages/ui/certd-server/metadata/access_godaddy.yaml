name: godaddy
title: godaddy授权
icon: simple-icons:godaddy
desc: ''
input:
  key:
    title: Key
    component:
      placeholder: 授权key
    helper: >-
      [https://developer.godaddy.com/keys](https://developer.godaddy.com/keys)，创建key（选择product，不要选择ote）
    required: true
    encrypt: false
  secret:
    title: Secret
    component:
      name: a-input-password
      vModel: value
    required: true
    encrypt: true
  httpProxy:
    title: HTTP代理
    component:
      placeholder: http://xxxxx:xx
    helper: 使用https_proxy
    required: false
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常(注意账号中必须要有50个域名才能使用API接口)
type: builtIn
pluginType: access
scriptFilePath: ../../../plugins/plugin-godaddy/access.js
