showRunStrategy: false
default:
  strategy:
    runStrategy: 0
name: TencentDeleteExpiringCert
title: 腾讯云-删除即将过期证书
icon: svg:icon-tencentcloud
group: tencent
desc: 仅删除未使用的证书
needPlus: true
input:
  accessId:
    title: Access提供者
    helper: access 授权
    component:
      name: access-selector
      type: tencent
    required: true
    order: 0
  searchKey:
    title: 关键字筛选
    helper: 仅匹配ID、备注名称、域名包含关键字的证书，可以不填
    required: false
    component:
      name: a-input
    order: 0
  maxCount:
    title: 最大删除数量
    helper: 单次运行最大删除数量
    value: 100
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
  expiringDays:
    title: 即将过期天数
    helper: 仅删除有效期小于此天数的证书
    value: 18
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
  checkTimeout:
    title: 检查超时时间
    helper: 检查删除任务结果超时时间,单位分钟
    value: 10
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-tencent/plugin/delete-expiring-cert/index.js
