showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToDCDN
title: 火山引擎-部署证书至DCDN
icon: svg:icon-volcengine
group: volcengine
desc: 部署至火山引擎全站加速
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  autoMatch:
    title: 自动匹配
    helper: 是否根据证书自动匹配合适的DCDN域名进行部署
    value: false
    component:
      name: a-switch
      type: checked
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  domainList:
    title: DCDN域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                   return {
                      show: ctx.compute(({form})=>{
                        return !form.autoMatch
                      })
                   }
                  
    helper: 选择要部署证书的DCDN域名
    order: 0
output: {}
type: builtIn
pluginType: deploy
scriptFilePath: ../../../plugins/plugin-volcengine/plugins/plugin-deploy-to-dcdn.js
