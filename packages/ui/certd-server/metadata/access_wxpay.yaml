name: wxpay
title: 微信支付
icon: tdesign:logo-wechatpay-filled
input:
  appId:
    title: AppId
    component:
      placeholder: 201909176714xxxx
    required: true
    encrypt: false
  mchid:
    title: 商户ID
    component:
      placeholder: 201909176714xxxx
    required: true
    encrypt: false
  publicKey:
    title: 公钥
    component:
      name: a-textarea
      rows: 3
      placeholder: MIIBIjANBg...
    required: true
    encrypt: true
  privateKey:
    title: 私钥
    component:
      placeholder: MIIEvQIBADANB...
      name: a-textarea
      rows: 3
    required: true
    encrypt: true
  key:
    title: APIv3密钥
    helper: 微信商户平台—>账户设置—>API安全—>设置APIv3密钥
    required: true
    encrypt: true
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-plus/wxpay/access.js
