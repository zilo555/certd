showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToVod
title: 阿里云-部署至VOD
icon: svg:icon-aliyun
group: aliyun
desc: 部署证书到阿里云视频点播（vod）
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择证书申请任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  casEndpoint:
    title: 证书接入点
    helper: 不会选就保持默认即可
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
        - value: cas.eu-central-1.aliyuncs.com
          label: 德国（法兰克福）
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  domainList:
    title: 加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: true
      pager: true
      watches:
        - certDomains
        - accessId
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择要部署证书的域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-aliyun/plugin/deploy-to-vod/index.js
