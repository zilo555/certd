showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToWafCloud
title: 阿里云-部署至阿里云WAF(云产品接入)
icon: svg:icon-aliyun
group: aliyun
desc: 部署证书到阿里云WAF(云产品接入)，CNAME方式接入的请选择另外一个waf插件
needPlus: false
input:
  cert:
    title: 域名证书
    helper: |-
      请选择证书申请任务输出的域名证书
      或者选择前置任务“上传证书到阿里云”任务的证书ID，可以减少上传到阿里云的证书数量
    component:
      name: output-selector
      from:
        - ':cert:'
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  regionId:
    title: WAF接入点
    helper: 不会选就按默认
    value: cn-hangzhou
    component:
      name: a-select
      options:
        - value: cn-hangzhou
          label: 中国内地
        - value: ap-southeast-1
          label: 非中国内地
    required: true
    order: 0
  casEndpoint:
    title: 证书接入点
    helper: 跟上面保持一致即可
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
        - value: cas.eu-central-1.aliyuncs.com
          label: 德国（法兰克福）
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  cloudResources:
    title: 云产品资源
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetCloudResourceList
      search: true
      pager: true
      single: false
      watches:
        - certDomains
        - accessId
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择要部署证书的云产品资源
    order: 0
  certType:
    title: 证书部署类型
    value: default
    component:
      name: a-select
      options:
        - value: default
          label: 默认证书
        - value: extension
          label: 扩展证书
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-waf/deploy-to-waf-cloud.js
