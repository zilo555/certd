showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: CmccDeployCertToCdn
title: 中国移动-部署证书到CDN
desc: 中国移动自动部署证书到CDN
icon: svg:icon-cmcc
group: cdn
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: 中国移动-授权
    component:
      name: access-selector
      type: cmcc
    required: true
    order: 0
  domainList:
    title: 加速域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要更新的中国移动CDN域名
    order: 0
output: {}
type: builtIn
pluginType: deploy
scriptFilePath: ../../../plugins/plugin-cmcc/plugin-deploy-to-cdn.js
