showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToESA
title: 阿里云-部署至ESA
icon: svg:icon-aliyun
group: aliyun
desc: 部署证书到阿里云ESA(边缘安全加速)，自动删除过期证书
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择证书申请任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  regionId:
    title: 大区
    value: cn-hangzhou
    component:
      name: a-auto-complete
      vModel: value
      options:
        - value: cn-hangzhou
          label: 华东1（杭州）
        - value: ap-southeast-1
          label: 新加坡
    required: true
    order: 0
  casEndpoint:
    title: 证书接入点
    helper: 不会选就保持默认即可
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  siteIds:
    title: 站点
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetSiteList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择要部署证书的站点
    order: 0
  certLimit:
    title: 免费证书数量限制
    value: 2
    component:
      name: a-input-number
      vModel: value
    helper: 将检查证书数量限制，如果超限将删除最旧的那张证书
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-esa/index.js
