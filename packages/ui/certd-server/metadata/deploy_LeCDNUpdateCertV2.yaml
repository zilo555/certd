showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: LeCDNUpdateCertV2
title: LeCDN-更新证书V2
desc: 支持新版本LeCDN
icon: material-symbols:shield-outline
group: cdn
needPlus: false
input:
  accessId:
    title: LeCDN授权
    component:
      name: access-selector
      type: lecdn
    required: true
    order: 0
  certIds:
    title: 证书ID
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: LeCDNUpdateCertV2
      action: onGetCertList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择要更新的证书id，注意域名是否与证书匹配
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/lecdn/plugins/plugin-update-cert-v2.js
