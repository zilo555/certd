showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToALB
title: 火山引擎-部署证书至ALB
icon: svg:icon-volcengine
group: volcengine
desc: 部署至火山引擎应用负载均衡
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - VolcengineUploadToCertCenter
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  regionId:
    title: Region
    helper: 地区选择
    component:
      name: a-select
      options:
        - label: 北京
          value: cn-beijing
        - label: 上海
          value: cn-shanghai
        - label: 广州
          value: cn-guangzhou
        - label: 香港
          value: cn-hongkong
        - label: 柔佛
          value: ap-southeast-1
        - label: 雅加达
          value: ap-southeast-3
    value: cn-beijing
    required: true
    order: 0
  listenerList:
    title: 监听器列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetListenerList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
        - regionId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: |-
      选择要部署证书的监听器
      需要在监听器中选择证书中心，进行跨服务访问授权
    order: 0
  certType:
    title: 证书部署类型
    helper: 选择部署默认证书还是扩展证书
    component:
      name: a-select
      options:
        - label: 默认证书
          value: default
        - label: 扩展证书
          value: extension
    value: default
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-volcengine/plugins/plugin-deploy-to-alb.js
