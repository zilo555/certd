showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DokployRefreshCert
title: Dokploy-部署server证书
desc: 自动更新Dokploy server证书
icon: svg:icon-lucky
group: panel
needPlus: true
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Dokploy授权
    component:
      name: access-selector
      type: dokploy
    required: true
    order: 0
  serverList:
    title: 证书名称
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetServerList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 要更新的证书名称，如果这里没有，请先给手动绑定一次证书
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-dokploy/plugins/plugin-refresh-cert.js
