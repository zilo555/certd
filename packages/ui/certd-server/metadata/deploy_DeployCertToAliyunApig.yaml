showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToAliyunApig
title: 阿里云-部署至云原生API网关/AI网关
icon: svg:icon-aliyun
group: aliyun
desc: 自动部署域名证书至云原生API网关、AI网关
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  regionEndpoint:
    title: 区域
    component:
      name: remote-auto-complete
      vModel: value
      mode: tags
      type: plugin
      action: onGetRegionList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择区域
    order: 0
  gatewayType:
    title: 网关类型
    component:
      name: a-select
      vModel: value
      options:
        - value: AI
          label: AI
        - value: API
          label: API
    required: true
    order: 0
  domainList:
    title: 绑定域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - region
        - accessId
        - gatewayType
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择域名
    order: 0
  forceHttps:
    title: 强制HTTPS
    component:
      name: a-select
      vModel: value
      options:
        - value: true
          label: 强制HTTPS
        - value: false
          label: 不强制HTTPS
    required: true
    order: 0
  casRegion:
    title: 证书服务接入点
    helper: 不会选就按默认
    value: cn-hangzhou
    component:
      name: a-select
      options:
        - value: cn-hangzhou
          label: 中国大陆
        - value: ap-southeast-1
          label: 新加坡
    required: true
    order: 0
output: {}
type: builtIn
pluginType: deploy
scriptFilePath: ../../../plugins/plugin-aliyun/plugin/index.js
