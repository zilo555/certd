showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: FnOSDeployToNAS
title: 飞牛NAS-部署证书
icon: svg:icon-fnos
group: panel
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: 飞牛SSH授权
    component:
      name: access-selector
      type: ssh
    helper: |-
      请先配置sudo免密：
      sudo visudo
      #在文件最后一行增加以下内容，需要将username替换成自己的用户名
      username ALL=(ALL) NOPASSWD: NOPASSWD: ALL
      ctrl+x 保存退出
    required: true
    order: 0
  certList:
    title: 证书Id
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetCertList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 面板证书请选择fnOS，其他FTP、webdav等证书请选择已使用，可多选（如果证书域名都匹配的话）
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-fnos/index.js
