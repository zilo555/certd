showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: WestDeployToVhost
title: 西数-部署到虚拟主机
desc: 西部数码部署证书到虚拟主机
icon: svg:icon-lucky
group: cdn
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: 西数授权
    component:
      name: access-selector
      type: west
    required: true
    order: 0
  vhostList:
    title: 虚拟主机列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetVhostList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 虚拟主机列表
    order: 0
output: {}
type: builtIn
pluginType: deploy
scriptFilePath: ../../../plugins/plugin-west/plugins/deploy-to-vhost.js
