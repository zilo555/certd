showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: BaiduUploadCert
title: 百度云-上传到证书托管
icon: ant-design:baidu-outlined
desc: 上传证书到百度云证书托管中心
group: baidu
input:
