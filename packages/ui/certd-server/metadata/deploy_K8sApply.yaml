showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: K8sApply
title: K8S-Apply自定义yaml
icon: mdi:kubernetes
desc: apply自定义yaml到k8s
needPlus: true
group: panel
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  preOutput:
    title: 前置任务输出
    helper: 请选择前置任务输出的内容
    component:
      name: output-selector
      from:
        - '::'
    required: false
    order: 0
  accessId:
    title: k8s授权
    helper: kubeconfig
    component:
      name: access-selector
      type: k8s
    required: true
    order: 0
  yamlContent:
    title: yaml
    required: true
    helper: >-
      apply
      yaml，模板变量：主域名=${mainDomain}、全部域名=${domains}、过期时间=${expiresTime}、证书PEM=${crt}、证书私钥=${key}、中间证书/CA证书=${ic}、前置任务输出=${preOutput}
    component:
      name: a-textarea
      vModel: value
      rows: 6
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: ../../../plugins/plugin-plus/k8s/plugins/plugin-apply.js
