showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToTOS
title: 火山引擎-部署证书至TOS自定义域名
icon: svg:icon-volcengine
group: volcengine
desc: 仅限TOS自定义域名，加速域名请选择火山引擎的CDN插件
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
        - VolcengineUploadToCertCenter
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  region:
    title: 地域
    helper: TOS服务所在地域
    component:
      name: a-select
      options:
        - label: 华北2（北京）
          value: cn-beijing
        - label: 华东2（上海）
          value: cn-shanghai
        - label: 华南1（广州）
          value: cn-guangzhou
        - label: 中国香港
          value: cn-hongkong
        - label: 亚太东南（柔佛）
          value: ap-southeast-1
        - label: 亚太东南（雅加达）
          value: ap-southeast-3
    value: cn-beijing
    required: true
    order: 0
  bucket:
    title: Bucket
    helper: 存储桶名称
    component:
      name: remote-auto-complete
      vModel: value
      type: plugin
      action: onGetBucketList
      search: false
      pager: false
      watches:
        - accessId
        - region
    required: true
    order: 0
  domainName:
    title: TOS自定义域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
        - region
        - bucket
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 你在火山引擎上配置的TOS自定义域名，比如:example.com
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-volcengine/plugins/plugin-deploy-to-tos.js
