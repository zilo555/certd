showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: AliyunDeployCertToAll
title: 阿里云-部署至任意云资源
icon: svg:icon-aliyun
group: aliyun
desc: >-
  【不建议使用】需要消耗阿里云自动部署次数，支持SLB、LIVE、webHosting、VOD、CR、DCDN、DDoS、CDN、ALB、APIGateway、FC、GA、MSE、NLB、OSS、SAE、WAF等云产品
needPlus: false
input:
  cert:
    title: 域名证书
    helper: |-
      请选择证书申请任务输出的域名证书
      或者选择前置任务“上传证书到阿里云”任务的证书ID，可以减少上传到阿里云的证书数量
    component:
      name: output-selector
      from:
        - ':cert:'
        - uploadCertToAliyun
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  endpoint:
    title: 接入点
    helper: 不会选就按默认
    value: cas.aliyuncs.com
    component:
      name: a-select
      options:
        - value: cas.aliyuncs.com
          label: 中国大陆
        - value: cas.ap-southeast-1.aliyuncs.com
          label: 新加坡
        - value: cas.eu-central-1.aliyuncs.com
          label: 德国（法兰克福）
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  cloudProduct:
    title: 云产品类型
    helper: 请选择云产品类型
    component:
      name: a-select
      vModel: value
      options:
        - value: SLB
          label: SLB-传统型负载均衡 CLB（仅中国站）
        - value: LIVE
          label: LIVE-视频直播（仅中国站）
        - value: webHosting
          label: webHosting-云虚拟主机（仅中国站）
        - value: VOD
          label: VOD-视频点播（仅中国站）
        - value: CR
          label: CR-容器镜像服务（仅中国站）
        - value: DCDN
          label: DCDN-全站加速
        - value: DDoS
          label: DDos 防护
        - value: CDN
          label: CDN-内容分发网络
        - value: ALB
          label: ALB-应用负载均衡
        - value: APIGateway
          label: APIGateway-API 网关
        - value: FC
          label: FC-函数计算
        - value: GA
          label: GA-全球加速
        - value: MSE
          label: MSE-微服务引擎
        - value: NLB
          label: NLB-网络型负载均衡
        - value: OSS
          label: OSS-对象存储
        - value: SAE
          label: SAE-Serverless应用引擎
        - value: WAF
          label: WAF-Web应用防火墙
    required: true
    order: 0
  productIds:
    title: 要部署证书的云产品
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: AliyunDeployCertToAll
      action: onGetProductList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
        - cloudProduct
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择要部署证书的云产品，注意：新创建的云产品资源可能需要过1-2小时才会在此处显示
    order: 0
  contactIds:
    title: 联系人
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: AliyunDeployCertToAll
      action: onGetContactList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: >-
      请选择联系人,如果没有，需要先到[阿里云控制台创建联系人](https://yundun.console.aliyun.com/?p=cas#/informationManagement/person/)
    order: 0
  checkTimeout:
    title: 检查超时时间
    helper: 检查部署任务超时时间,单位分钟
    value: 10
    component:
      name: a-input-number
      vModel: value
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-all/index.js
