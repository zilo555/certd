showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: YidunDeployToRCDN
title: 易盾-部署到易盾RCDN
icon: material-symbols:shield-outline
group: cdn
desc: 易盾CDN，每月免费30G，[注册即领](https://rhcdn.yiduncdn.com/register?code=8mn536rrzfbf8)
needPlus: false
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  accessId:
    title: 易盾RCDN授权
    helper: 易盾RCDN授权
    component:
      name: access-selector
      type: yidunrcdn
    required: true
    order: 0
  domains:
    title: 域名列表
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      typeName: YidunDeployToRCDNPlugin
      action: onGetDomainList
      search: false
      pager: false
      watches:
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择要部署证书的站点域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-plus/yidun/plugins/plugin-deploy-to-rcdn.js
