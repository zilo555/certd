showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: QiniuDeployCertToOSS
title: 七牛云-部署证书至OSS
icon: svg:icon-qiniuyun
group: qiniu
desc: 自动部署域名证书至七牛云KODO，注意是自定义源站域名，不是CDN域名
input:
  domainName:
    title: 自定义源站域名
    helper: 你在七牛云上配置的OSS域名，比如:certd.handfree.work
    required: true
    order: 0
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书，或者上传到七牛云的证书id
    component:
      name: output-selector
      from:
        - ':cert:'
        - QiniuCertUpload
    required: true
    order: 0
  accessId:
    title: Access授权
    helper: 七牛云授权
    component:
      name: access-selector
      type: qiniu
    required: true
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-qiniu/plugin/plugin-deploy-to-oss.js
