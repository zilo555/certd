showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: DeployCertToAliyunApiGateway
title: 阿里云-部署证书至API网关
icon: svg:icon-aliyun
group: aliyun
desc: 自动部署域名证书至阿里云API网关（APIGateway）
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 阿里云授权AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: aliyun
    required: true
    order: 0
  certName:
    title: 证书名称
    helper: 上传后将以此名称作为前缀备注
    order: 0
  regionEndpoint:
    title: 区域
    component:
      name: remote-auto-complete
      vModel: value
      mode: tags
      type: plugin
      action: onGetRegionList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择区域
    order: 0
  groupId:
    title: API分组
    component:
      name: remote-auto-complete
      vModel: value
      mode: tags
      type: plugin
      action: onGetGroupList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
        - regionEndpoint
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 请选择API分组
    order: 0
  customDomains:
    title: 绑定域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      single: false
      watches:
        - certDomains
        - accessId
        - groupId
        - regionEndpoint
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 在API分组上配置的绑定域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-aliyun/plugin/deploy-to-apigateway/index.js
