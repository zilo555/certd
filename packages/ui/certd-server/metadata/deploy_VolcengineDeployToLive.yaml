showRunStrategy: false
default:
  strategy:
    runStrategy: 1
name: VolcengineDeployToLive
title: 火山引擎-部署证书至Live
icon: svg:icon-volcengine
group: volcengine
desc: 部署至火山引擎视频直播
input:
  cert:
    title: 域名证书
    helper: 请选择前置任务输出的域名证书
    component:
      name: output-selector
      from:
        - ':cert:'
    required: true
    order: 0
  certDomains:
    title: 当前证书域名
    component:
      name: cert-domains-getter
    mergeScript: |2-

              return {
                component:{
                    inputKey: ctx.compute(({form})=>{
                      return form.cert
                    }),
                }
              }
              
    template: false
    required: false
    order: 0
  accessId:
    title: Access授权
    helper: 火山引擎AccessKeyId、AccessKeySecret
    component:
      name: access-selector
      type: volcengine
    required: true
    order: 0
  domainList:
    title: 直播域名
    component:
      name: remote-select
      vModel: value
      mode: tags
      type: plugin
      action: onGetDomainList
      search: false
      pager: false
      multi: true
      watches:
        - certDomains
        - accessId
        - certDomains
        - accessId
    required: true
    mergeScript: |2-

                return {
                  component:{
                    form: ctx.compute(({form})=>{
                      return form
                    })
                  },
               }
              
    helper: 选择要部署证书的直播域名
    order: 0
output: {}
pluginType: deploy
type: builtIn
scriptFilePath: /plugins/plugin-volcengine/plugins/plugin-deploy-to-live.js
