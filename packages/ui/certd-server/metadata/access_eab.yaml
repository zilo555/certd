name: eab
title: EAB授权
desc: ZeroSSL证书申请需要EAB授权
icon: ic:outline-lock
input:
  eabType:
    title: EAB类型
    component:
      name: a-select
      options:
        - value: google
          label: Google
          icon: flat-color-icons:google
        - value: zerossl
          label: ZeroSSL
          icon: emojione:digit-zero
        - value: litessl
          label: litessl
          icon: roentgen:free
        - value: sslcom
          label: SSL.com
          icon: la:expeditedssl
    helper: 请选择EAB类型
    required: true
    encrypt: false
  kid:
    title: KID
    component:
      placeholder: kid / keyId
    helper: EAB KID， google的叫 keyId，ssl.com的叫Account/ACME Key
    required: true
    encrypt: true
  hmacKey:
    title: HMACKey
    component:
      placeholder: HMAC Key / b64MacKey
    helper: EAB HMAC Key ，google的叫b64MacKey
    required: true
    encrypt: true
  email:
    title: email
    component:
      placeholder: 绑定一个邮箱
    rules:
      - type: email
        message: 请输入正确的邮箱
    helper: 绑定一个邮箱，避免失效
    required: true
  accountKey:
    title: ACME账号私钥
    component:
      name: refresh-input
      action: GenerateAccountKey
      buttonText: 生成
      successMessage: 账号私钥已生成，请保存授权配置
    required: true
    helper: |-
      如果修改了KID，请点击生成重新生成账号私钥
      注意：google的EAB只能生成一次账号私钥，更新私钥需要获取一个新的EAB授权
    encrypt: true
pluginType: access
type: builtIn
scriptFilePath: /plugins/plugin-cert/access/eab-access.js
