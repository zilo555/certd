name: goedge
title: GoEdge授权
icon: fa-solid:leaf:#6C6BF6
order: 100
input:
  endpoint:
    title: 系统地址
    component:
      name: a-input
      vModel: value
    helper: 例如：http://yourdomain.com:8002， 需要在API节点配置中开启HTTP访问地址
    encrypt: false
    required: true
  userType:
    title: 用户类型
    component:
      name: a-select
      vModel: value
      options:
        - label: 用户
          value: user
        - label: 管理员
          value: admin
    encrypt: false
    required: true
  accessKeyId:
    title: accessKeyId
    helper: |-
      用户AccessKey: 在”平台用户-用户-详情-AccessKey” 或 商业版的“访问控制” 中创建。
      管理员AccessKey：在”系统用户-用户-详情-AccessKey” 中创建。
    component:
      name: a-input
      vModel: value
    encrypt: false
    required: true
  accessKey:
    title: accessKey
    component:
      name: a-input
      vModel: value
    encrypt: true
    required: true
  testRequest:
    title: 测试
    component:
      name: api-test
      action: TestRequest
    helper: 点击测试接口是否正常
type: builtIn
pluginType: access
scriptFilePath: ../../../plugins/plugin-goedge/index.js
