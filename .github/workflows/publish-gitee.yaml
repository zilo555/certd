name: publish-gitee
on:
  push:
    branches: ['v2-dev']
    paths:
      - "trigger/publish.trigger"
  workflow_run:
    workflows: [ "build-image-for-release" ]
    types:
      - completed

#  schedule:
#    - # 国际时间 19:17 执行，北京时间3:17  ↙↙↙ 改成你想要每天自动执行的时间
#    - cron: '17 19 * * *'
permissions:
  contents: read
  packages: write

jobs:
  publish-atomgit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
            
      - name: publish_to_gitee
        id: publish_to_gitee
        run: |
          export GITEE_TOKEN=${{ secrets.GITEE_TOKEN }}
          pnpm install
          npm run publish_to_gitee
        working-directory: ./
    